<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ヒントページ</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    .section {
      background: white;
      margin-bottom: 20px;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 18px; /* ← 高さアップ */
      font-size: 18px; /* ← 大きく */
      border: none;
      border-radius: 10px;
      background: #0078d4;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #005ea2;
    }
    .hint {
      display: none;
      margin: 5px 0 10px 0;
      padding: 10px;
      background: #e8f0fe;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <h1>謎解きヒント</h1>

  <!-- 初級編 -->
  <div class="section">
    <h2>初級編ヒント</h2>
    <div id="beginner"></div>

    <button onclick="toggleHint('b-final')">最終問題</button>
    <div id="b-final" class="hint">
      【初級最終】「マークの名前」が何を指すのかは、遊び方の所に書いてあります。すべてのマークを探して指示に従いましょう。
    </div>
  </div>

  <!-- 上級編 -->
  <div class="section">
    <h2>上級編ヒント</h2>
    <div id="advanced"></div>

    <button onclick="toggleHint('a-final')">最終問題</button>
    <div id="a-final" class="hint">【上級最終】工事中</div>
  </div>

  <script>
    function toggleHint(id) {
      const el = document.getElementById(id);
      el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    // ===== 初級タイトル =====
    const beginnerTitles = [
      "金魚の目線の問題",
      "黒い図形の問題",
      "数字のパネルの問題",
      "うえ かき の問題",
      "円の中の文字の問題",
      "迷路の問題"
    ];

    // ===== 初級ヒント（←ヒント1・2に分割）=====
    const beginnerHints = [
      ["パネルをよく見てみましょう。", "金魚がどこかにいるはずです。"],
      ["黒い図形に注目", "食べ物を構成できます。3つの揚げ物＋デザート"],
      ["3に注目", "足して3になる組み合わせは1つだけ"],
      ["色付きマスに注目", "「うえ」「かき」の間に「お」が入る"],
      ["12個並んだ数字に注目", "円形のヒントは身近なものです"],
      ["ワープできます", "同じ色の◇で移動できます"]
    ];

    // ===== 上級タイトル =====
    const advancedTitles = [
      "上級Q1",
      "上級Q2",
      "上級Q3",
      "上級Q4",
      "上級Q5",
      "上級Q6"
    ];

    // ===== 上級ヒント =====
    const advancedHints = [
      ["工事中", "工事中"],
      ["工事中", "工事中"],
      ["工事中", "工事中"],
      ["工事中", "工事中"],
      ["工事中", "工事中"],
      ["工事中", "工事中"]
    ];

    // ===== 共通処理 =====
    function createQuestions(containerId, prefix, hints, titles) {
      const container = document.getElementById(containerId);

      for (let i = 1; i <= hints.length; i++) {
        const btn = document.createElement('button');
        btn.textContent = titles[i - 1];
        btn.onclick = () => toggleHint(prefix + i);

        const hint = document.createElement('div');
        hint.id = prefix + i;
        hint.className = 'hint';

        // ▼ ヒント1+ヒント2表示
        hint.innerHTML =
          "<b>ヒント1：</b>" + hints[i - 1][0] + "<br>" +
          "<b>ヒント2：</b>" + hints[i - 1][1];

        container.appendChild(btn);
        container.appendChild(hint);
      }
    }

    createQuestions('beginner', 'b', beginnerHints, beginnerTitles);
    createQuestions('advanced', 'a', advancedHints, advancedTitles);
  </script>

</body>
</html>
