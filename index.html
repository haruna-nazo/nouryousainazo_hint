<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ヒントページ</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }
    .section {
      background: white;
      margin-bottom: 20px;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    button {
      display: block;
      width: 100%;
      margin: 8px 0;
      padding: 18px; /* ← 高さアップ */
      font-size: 18px; /* ← 大きく */
      border: none;
      border-radius: 10px;
      background: #0078d4;
      color: white;
      cursor: pointer;
    }
    button:hover {
      background: #005ea2;
    }
    .hint {
      display: none;
      margin: 5px 0 10px 0;
      padding: 10px;
      background: #e8f0fe;
      border-radius: 5px;
    }
  </style>
</head>
<body>

  <h1>謎解きヒント</h1>

  <!-- 初級編 -->
  <div class="section">
    <h2>初級編ヒント</h2>
    <div id="beginner"></div>

    <button onclick="toggleHint('b-final')">最終問題</button>
    <div id="b-final" class="hint">
      【初級最終】「マークの名前」が何を指すのかは、遊び方の所に書いてあります。すべてのマークを探して指示に従いましょう。
    </div>
  </div>

  <!-- 上級編 -->
  <div class="section">
    <h2>上級編ヒント</h2>
    <div id="advanced"></div>

    <button onclick="toggleHint('a-final')">最終問題</button>
    <div id="a-final" class="hint">【上級最終】工事中</div>
  </div>

  <script>
    function toggleHint(id) {
      const el = document.getElementById(id);
      el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    // ===== 初級タイトル =====
    const beginnerTitles = [
      "金魚の目線の問題",
      "黒い図形がある問題",
      "数字のパネルの問題",
      "うえ かき と書いてある問題",
      "円の中に文字が書いてある問題",
      "迷路の問題"
    ];

    // ===== 初級ヒント（←ヒント1・2に分割）=====
    const beginnerHints = [
      ["パネルをよく見てみましょう。金魚がいるはずです。", "金魚は右の方を見ています。その目線の先には４つの文字があります。"],
      ["黒い図形を組み合わせると食べ物が出来ます。２つの揚げ物と、２つの甘い物が出来ます。", "例えばパネルにある「から」と手元の紙にある「あげ」を組み合わせると「からあげ」ができます。あと３つ見つけましょう。"],
      ["左下に注目しましょう。合計が3になる数字の組み合わせは１つしかありません。", "使えるパネルの内、１と２のパネルを足すと３になります。同じ数字は使えないルールも頭に入れつつ、他のマスも埋めましょう。"],
      ["色がついているマスにはそれぞれ「うえ」「かき」が入るようです。", "そのままマス目に入れると「？？うえおかき？？？？…」この並び順はどこかで見覚えが無いでしょうか？"],
      ["円形に12個並んでいるもの。これと似たものが身近にあります。", "一番上が12の場所です。"],
      ["同じ色の◇にワープできるようです。", "まずは赤い◇から別の赤い◇へワープしましょう。次に通れる◇を探しましょう。"]
    ];

    // ===== 上級タイトル =====
    const advancedTitles = [
      "紙を配置する謎",
      "黒い図形がある謎",
      "数字のパネルの謎",
      "うし　すし　と書いてある謎",
      "テープが張ってある謎",
      "迷路の謎"
    ];

    // ===== 上級ヒント =====
    const advancedHints = [
      ["ヒントはありません。この謎はそこまで難しくないからです。", "ここから先は自分の力で考えて解こう。"],
      ["会場の料理に似たものあるんじゃないでしょうか？(問題制作時はどんな料理が出てくるのか知らされていません)。", "ここから先は自分の力で考えて解こう。"],
      ["盤面には11が多いですね。ちなみに確定できる箇所は一番上のマスです。", "ここから先は自分の力で考えて解こう。"],
      ["ヒントはありません。料理でも食べてお考え下さい。", "ここから先は自分の力で考えて解こう。"],
      ["ヒントはありません。ゴミ拾いでもしてお考え下さい。", "ここから先は自分の力で考えて解こう。"],
      ["ヒントはありません。句読点の数でも数えてお考え下さい。", "ここから先は自分の力で考えて解こう。"]
    ];

    // ===== 共通処理 =====
    function createQuestions(containerId, prefix, hints, titles) {
      const container = document.getElementById(containerId);

      for (let i = 1; i <= hints.length; i++) {
        const btn = document.createElement('button');
        btn.textContent = titles[i - 1];
        btn.onclick = () => toggleHint(prefix + i);

        const hint = document.createElement('div');
        hint.id = prefix + i;
        hint.className = 'hint';

        // ▼ ヒント1+ヒント2表示
        
hint.innerHTML =
  "<b>ヒント1：</b>" + hints[i - 1][0] +
  "<br><br>" +
  "<button onclick=\"document.getElementById('" + prefix + "h2_" + i + "').style.display='block'\">さらにヒントを見る</button>" +
  "<div id='" + prefix + "h2_" + i + "' style='display:none; margin-top:8px;'>" +
  "<b>ヒント2：</b>" + hints[i - 1][1] +
  "</div>";
        
        container.appendChild(btn);
        container.appendChild(hint);
      }
    }

    createQuestions('beginner', 'b', beginnerHints, beginnerTitles);
    createQuestions('advanced', 'a', advancedHints, advancedTitles);
  </script>

</body>
</html>
